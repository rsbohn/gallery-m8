name: Update File List

on:
  push:
    paths:
      - 'media/*.json'
  workflow_dispatch:

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Update index.html with file list
        run: |
          cd media
          # Get all .json files, sorted alphabetically
          FILES=$(ls -1 *.json 2>/dev/null | jq -R -s -c 'split("\n") | map(select(length > 0)) | sort')
          
          # Update index.html with the file list
          cd ..
          sed -i "/FILELIST_START/,/FILELIST_END/c\\    // FILELIST_START\n    const files = $FILES;\n    // FILELIST_END" index.html
          
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code index.html || echo "changed=true" >> $GITHUB_OUTPUT
          
      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m "Update file list in index.html"
          git push
