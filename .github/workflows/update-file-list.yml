name: Update File List

on:
  push:
    paths:
      - 'media/*.json'
  workflow_dispatch:

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Generate files.json
        run: |
          cd media
          # Get all .json files except files.json itself, sorted alphabetically
          FILES=$(ls -1 *.json 2>/dev/null | grep -v '^files\.json$' | jq -R -s -c 'split("\n") | map(select(length > 0)) | sort')
          
          # Create the files.json manifest
          echo "{" > files.json
          echo "  \"files\": $FILES" >> files.json
          echo "}" >> files.json
          
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code media/files.json || echo "changed=true" >> $GITHUB_OUTPUT
          
      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add media/files.json
          git commit -m "Update media/files.json manifest"
          git push
