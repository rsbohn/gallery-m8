<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gallery M8</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: system-ui, sans-serif; 
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 0;
      border-bottom: 2px solid #ccc;
      background: #fff;
    }
    .header h1 {
      margin: 0;
      padding: 0;
      font-size: 1.5rem;
      background-color: steelblue;
      color: white;
    }
    .header .subtitle {
      margin: 0;
      padding: 0.5rem 1.5rem;
      font-size: 0.9rem;
      color: #666;
    }
    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .sidebar {
      width: 300px;
      border-right: 1px solid #ccc;
      padding: 0;
      overflow-y: auto;
      background: #f8f9fa;
    }
    .sidebar h2 {
      margin: 0;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      background-color: steelblue;
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .preview {
      flex: 1;
      padding: 0;
      overflow-y: auto;
      background: #fff;
    }
    .preview h2 {
      margin: 0;
      padding: 0.75rem 1rem;
      font-size: 1.25rem;
      background-color: steelblue;
      color: white;
    }
    ul { 
      list-style: none;
      padding: 0.5rem;
      margin: 0;
    }
    li {
      margin-bottom: 0.25rem;
    }
    .file-link {
      display: block;
      padding: 0.5rem;
      text-decoration: none;
      color: #0066cc;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .file-link:hover {
      background: #e9ecef;
    }
    .file-link.active {
      background: #007bff;
      color: white;
    }
    pre {
      background: #f5f5f5;
      padding: 1rem;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    #preview-content {
      padding: 1rem;
    }
    .empty-state {
      color: #999;
      text-align: center;
      padding: 3rem;
      font-style: italic;
    }
    .footer {
      padding: 0.75rem 1.5rem;
      border-top: 2px solid #ccc;
      background: #f8f9fa;
      text-align: left;
      font-size: 0.9rem;
    }
    .footer a {
      color: #0066cc;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Gallery M8</h1>
    <p class="subtitle">by Dexter Starboard</p>
  </div>
  <div class="container">
    <div class="sidebar">
      <ul id="file-list">
        <li class="empty-state" style="padding: 1rem;">Loading files...</li>
      </ul>
    </div>
    <div class="preview">
      <div id="preview-content" class="empty-state">Select a file to preview</div>
    </div>
  </div>
  <div class="footer">
    <a href="https://github.com/rsbohn/gallery-m8" target="_blank">gallery-m8</a> on GitHub
  </div>

  <script>
    const fileList = document.getElementById('file-list');
    const previewTitle = document.getElementById('preview-title');
    const previewContent = document.getElementById('preview-content');

    // File list will be injected here by GitHub Actions
    // FILELIST_START
    const files = ["easter-eggs.json", "gallery-wireframe.json"];
    // FILELIST_END

    // Load and display file list dynamically
    function loadFileList() {
      try {
        fileList.innerHTML = '';
        
        files.forEach(fileName => {
          const li = document.createElement('li');
          const link = document.createElement('a');
          link.href = '#';
          link.className = 'file-link';
          link.dataset.file = `media/${fileName}`;
          link.textContent = fileName;
          
          link.addEventListener('click', (e) => handleFileClick(e, link));
          
          li.appendChild(link);
          fileList.appendChild(li);
        });
        
        if (files.length === 0) {
          fileList.innerHTML = '<li class="empty-state" style="padding: 1rem;">No files found</li>';
        }
      } catch (error) {
        fileList.innerHTML = '<li class="empty-state" style="padding: 1rem;">Failed to load file list</li>';
        console.error('Error loading file list:', error);
      }
    }

    async function handleFileClick(e, link) {
      e.preventDefault();
      
      // Update active state
      document.querySelectorAll('.file-link').forEach(l => l.classList.remove('active'));
      link.classList.add('active');
      
      const filePath = link.dataset.file;
      const fileName = filePath.split('/').pop();
      
      try {
        const response = await fetch(filePath);
        if (!response.ok) throw new Error('Failed to load file');
        
        const json = await response.json();
        
        previewTitle.textContent = fileName;
        previewContent.innerHTML = `<pre>${JSON.stringify(json, null, 2)}</pre>`;
      } catch (error) {
        previewTitle.textContent = 'Error';
        previewContent.innerHTML = `<div class="empty-state">Failed to load ${fileName}: ${error.message}</div>`;
      }
    }

    // Initialize on page load
    loadFileList();
  </script>
</body>
</html>
